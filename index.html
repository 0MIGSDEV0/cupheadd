<script>
// ====================== SETUP ======================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

let player = { x: W/2, y: H/2, size: 32, speed: 4.2, health: 3, invincible: 0 };
let keys = {};
let mouse = { x: W/2, y: H/2, down: false };
let bullets = [];
let bossBullets = [];
let enemies = [];
let particles = [];
let score = 0;
let killCount = 0;
let bossSpawned = false;
let gameRunning = true;
let lastShot = 0;
let lastBossShot = 0;

// ====================== INPUT ======================
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});
canvas.addEventListener('mousedown', () => mouse.down = true);
canvas.addEventListener('mouseup', () => mouse.down = false);

// ====================== TIRO DO JOGADOR ======================
function shoot(angle) {
    const now = Date.now();
    if (now - lastShot < 160) return;
    lastShot = now;
  
    bullets.push({
        x: player.x,
        y: player.y - 8,
        vx: Math.cos(angle) * 11.5,
        vy: Math.sin(angle) * 11.5,
        life: 48,
        size: 9
    });
  
    createParticles(player.x, player.y - 12, '#aaddff', 5);
}

// ====================== TIRO DO BOSS ======================
function bossShoot() {
    if (!bossSpawned) return;
    const now = Date.now();
    if (now - lastBossShot < 1800) return;
    lastBossShot = now;

    const boss = enemies.find(e => e.isBoss);
    if (!boss) return;

    const directions = [0, Math.PI/2, Math.PI, -Math.PI/2];

    directions.forEach(angle => {
        bossBullets.push({
            x: boss.x,
            y: boss.y,
            vx: Math.cos(angle) * 5.5,
            vy: Math.sin(angle) * 5.5,
            life: 90,
            size: 14
        });
    });

    createParticles(boss.x, boss.y, '#ff4444', 15);
}

// ====================== PARTÍCULAS ======================
function createParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        const speed = 2 + Math.random() * 5;
        const angle = Math.random() * Math.PI * 2;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 22 + Math.random() * 20,
            color,
            size: 4 + Math.random() * 7
        });
    }
}

// ====================== INIMIGOS ======================
function spawnEnemy() {
    if (enemies.length > 9 || bossSpawned) return;
  
    const angle = Math.random() * Math.PI * 2;
    const dist = 360;
    enemies.push({
        x: player.x + Math.cos(angle) * dist,
        y: player.y + Math.sin(angle) * dist,
        size: 26,
        speed: 1.7 + Math.random() * 0.6,
        health: 3,
        color: '#c22',
        isBoss: false
    });
}

function spawnBoss() {
    if (bossSpawned) return;
    bossSpawned = true;
    enemies.push({
        x: W/2,
        y: 120,
        size: 68,
        speed: 1.1,
        health: 45,
        color: '#111111',
        isBoss: true
    });
    createParticles(W/2, 120, '#ff0000', 60);
    lastBossShot = Date.now();
}

// ====================== LOOP ======================
function gameLoop() {
    if (!gameRunning) return;
  
    ctx.fillStyle = '#1a0f08';
    ctx.fillRect(0, 0, W, H);
  
    // Chão
    ctx.fillStyle = '#3a2a1f';
    for (let i = 0; i < 45; i++) {
        ctx.fillRect((i*47)%W, (i*39)%H, 26, 26);
    }

    // Movimento jogador
    let dx = 0, dy = 0;
    if (keys['w']) dy -= 1;
    if (keys['s']) dy += 1;
    if (keys['a']) dx -= 1;
    if (keys['d']) dx += 1;
    if (dx !== 0 || dy !== 0) {
        const len = Math.hypot(dx, dy);
        player.x += (dx / len) * player.speed;
        player.y += (dy / len) * player.speed;
    }
    player.x = Math.max(30, Math.min(W-30, player.x));
    player.y = Math.max(30, Math.min(H-30, player.y));

    // Tiro jogador
    if (keys['arrowup']) shoot(-Math.PI/2);
    if (keys['arrowdown']) shoot(Math.PI/2);
    if (keys['arrowleft']) shoot(Math.PI);
    if (keys['arrowright']) shoot(0);
    if (mouse.down) {
        const dxm = mouse.x - player.x;
        const dym = mouse.y - player.y;
        const angle = Math.atan2(dym, dxm);
        shoot(angle);
    }

    if (bossSpawned) bossShoot();

    // ====================== DESENHAR ISAAC (NOVO PIXEL ART) ======================
    ctx.save();
    ctx.translate(player.x, player.y);

    // Corpo / Roupinha azul
    ctx.fillStyle = '#2a5aa0';
    ctx.fillRect(-13, 10, 26, 22);           // corpo

    // Pernas
    ctx.fillStyle = '#f4c090';
    ctx.fillRect(-10, 28, 7, 12);
    ctx.fillRect( 3, 28, 7, 12);

    // Cabeça
    ctx.fillStyle = '#f4c090';               // pele
    ctx.fillRect(-15, -18, 30, 28);

    // Cabelo laranja
    ctx.fillStyle = '#e07020';
    ctx.fillRect(-15, -22, 30, 10);

    // Olhos
    ctx.fillStyle = '#000';
    ctx.fillRect(-10, -12, 7, 8);
    ctx.fillRect( 3, -12, 7, 8);

    ctx.fillStyle = '#fff';
    ctx.fillRect(-8, -11, 3, 3);
    ctx.fillRect( 5, -11, 3, 3);

    // Boca triste
    ctx.fillStyle = '#000';
    ctx.fillRect(-6, -2, 12, 2);

    // Lágrimas (azul claro)
    ctx.fillStyle = '#88ddff';
    ctx.fillRect(-11, 0, 3, 8);
    ctx.fillRect( 8, 0, 3, 8);

    // Braços (simples)
    ctx.fillStyle = '#f4c090';
    ctx.fillRect(-18, 12, 6, 10);
    ctx.fillRect(12, 12, 6, 10);

    ctx.restore();

    // ====================== TIROS DO JOGADOR ======================
    for (let i = bullets.length-1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx; b.y += b.vy; b.life--;
        const alpha = b.life / 48;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(b.x, b.y, b.size/2 + 3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#bbddff'; ctx.beginPath(); ctx.arc(b.x, b.y, b.size/2, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;

        if (b.life <= 0 || b.x < -30 || b.x > W+30 || b.y < -30 || b.y > H+30) {
            bullets.splice(i, 1);
        }
    }

    // ====================== TIROS DO BOSS ======================
    for (let i = bossBullets.length-1; i >= 0; i--) {
        const b = bossBullets[i];
        b.x += b.vx; b.y += b.vy; b.life--;

        ctx.globalAlpha = b.life / 90;
        ctx.fillStyle = '#ff0000';
        ctx.beginPath(); ctx.arc(b.x, b.y, b.size/2 + 2, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#ff6666';
        ctx.beginPath(); ctx.arc(b.x, b.y, b.size/2, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;

        if (player.invincible <= 0 && Math.hypot(player.x - b.x, player.y - b.y) < b.size/2 + 16) {
            player.health -= 2;
            player.invincible = 60;
            createParticles(player.x, player.y, '#ff0000', 30);
            document.getElementById('health').textContent = player.health;

            if (player.health <= 0) {
                gameRunning = false;
                document.getElementById('finalScore').textContent = score;
                document.getElementById('gameOver').style.display = 'block';
            }
            bossBullets.splice(i, 1);
            continue;
        }

        if (b.life <= 0 || b.x < -50 || b.x > W+50 || b.y < -50 || b.y > H+50) {
            bossBullets.splice(i, 1);
        }
    }

    // ====================== INIMIGOS ======================
    for (let i = enemies.length-1; i >= 0; i--) {
        const e = enemies[i];
      
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const dist = Math.hypot(dx, dy) || 1;
      
        e.x += (dx / dist) * e.speed;
        e.y += (dy / dist) * e.speed;

        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.size/2, 0, Math.PI*2);
        ctx.fill();

        if (e.isBoss) {
            ctx.fillStyle = '#fff';
            ctx.fillRect(e.x-18, e.y-14, 14, 16);
            ctx.fillRect(e.x+4, e.y-14, 14, 16);
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(e.x-13, e.y-10, 6, 8);
            ctx.fillRect(e.x+9, e.y-10, 6, 8);
        } else {
            ctx.fillStyle = '#fff';
            ctx.fillRect(e.x-8, e.y-6, 6, 8);
            ctx.fillRect(e.x+2, e.y-6, 6, 8);
            ctx.fillStyle = '#000';
            ctx.fillRect(e.x-6, e.y-4, 3, 4);
            ctx.fillRect(e.x+4, e.y-4, 3, 4);
        }

        // Colisão bala jogador × inimigo
        for (let j = bullets.length-1; j >= 0; j--) {
            const b = bullets[j];
            if (Math.hypot(b.x - e.x, b.y - e.y) < e.size/2 + b.size/2) {
                e.health--;
                bullets.splice(j, 1);
                createParticles(b.x, b.y, '#ffaaaa', 12);
              
                if (e.health <= 0) {
                    createParticles(e.x, e.y, e.isBoss ? '#440000' : '#aa0000', e.isBoss ? 90 : 35);
                    enemies.splice(i, 1);
                    score += e.isBoss ? 500 : 20;
                    killCount++;
                    document.getElementById('kills').textContent = killCount;

                    if (e.isBoss) {
                        gameRunning = false;
                        document.getElementById('victoryScore').textContent = score;
                        document.getElementById('victory').style.display = 'block';
                    }
                    else if (killCount >= 30 && !bossSpawned) {
                        spawnBoss();
                    }
                    break;
                }
            }
        }

        // Colisão jogador × inimigo
        if (player.invincible <= 0 && Math.hypot(player.x - e.x, player.y - e.y) < (e.isBoss ? 48 : 25)) {
            player.health -= e.isBoss ? 2 : 1;
            player.invincible = 60;
            createParticles(player.x, player.y, '#ff0000', 25);
            document.getElementById('health').textContent = player.health;
          
            if (player.health <= 0) {
                gameRunning = false;
                document.getElementById('finalScore').textContent = score;
                document.getElementById('gameOver').style.display = 'block';
            }
        }
    }

    if (player.invincible > 0) player.invincible--;

    if (!bossSpawned && Math.random() < 0.045) spawnEnemy();

    // Partículas
    for (let i = particles.length-1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * 0.97;
        p.y += p.vy * 0.97;
        p.life--;
        p.vx *= 0.96;
        p.vy *= 0.96;
      
        ctx.globalAlpha = p.life / 40;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
        if (p.life <= 0) particles.splice(i, 1);
    }
    ctx.globalAlpha = 1;

    document.getElementById('score').textContent = score;
    requestAnimationFrame(gameLoop);
}

// Iniciar
for (let i = 0; i < 4; i++) spawnEnemy();
gameLoop();

alert("The Binding of Isaac\n\nIsaac agora está em pixel art!\nBoss continua atirando em 4 direções.\n\nBoa sorte! 🔥");
</script>
