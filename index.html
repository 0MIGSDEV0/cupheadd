<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>The Binding of Isaac - Versão Corrigida + Boss</title>
<style>
    body { margin:0; overflow:hidden; background:#000; font-family:Arial; }
    canvas { display:block; margin:0 auto; image-rendering: pixelated; }
    #ui {
        position: absolute; top: 10px; left: 10px; color: white; z-index: 100;
        background: rgba(0,0,0,0.7); padding: 12px 18px; border-radius: 10px; font-size: 18px;
    }
    #gameOver, #victory {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        background: rgba(20,0,0,0.95); color: #ff6666; padding: 40px; border-radius: 20px;
        text-align: center; display: none; border: 4px solid #aa0000;
    }
    #victory {
        background: rgba(0,20,0,0.95); 
        color: #66ff66; 
        border: 4px solid #00aa00;
    }
    button { 
        padding: 12px 30px; font-size: 20px; background:#aa0000; color:white; 
        border:none; border-radius:8px; cursor:pointer; margin-top: 15px;
    }
    button:hover { background:#ff0000; }
    #victory button { background:#00aa00; }
    #victory button:hover { background:#00ff00; }
</style>
</head>
<body>
<div id="ui">
    <strong>THE BINDING OF ISAAC</strong><br>
    Vida: ❤️ <span id="health">3</span> &nbsp;&nbsp;
    Score: <span id="score">0</span><br>
    Mortes: <span id="kills">0</span>/30
    <small style="display:block; margin-top:5px;">
        WASD = mover | Mouse ou Setas = atirar
    </small>
</div>
<canvas id="game" width="800" height="600"></canvas>

<!-- Game Over -->
<div id="gameOver">
    <h1>GAME OVER</h1>
    <p>Score final: <span id="finalScore">0</span></p>
    <button onclick="location.reload()">Jogar Novamente</button>
</div>

<!-- Victory Screen -->
<div id="victory">
    <h1>🎉 VITÓRIA! 🎉</h1>
    <p>Você derrotou o Boss!</p>
    <p>Score final: <span id="victoryScore">0</span></p>
    <button onclick="location.reload()">Jogar Novamente</button>
</div>

<script>
// ====================== SETUP ======================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

let player = { x: W/2, y: H/2, size: 28, speed: 4.2, health: 3, invincible: 0 };
let keys = {};
let mouse = { x: W/2, y: H/2, down: false };
let bullets = [];
let enemies = [];
let particles = [];
let score = 0;
let killCount = 0;
let bossSpawned = false;
let gameRunning = true;
let lastShot = 0;

// ====================== INPUT ======================
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});
canvas.addEventListener('mousedown', () => mouse.down = true);
canvas.addEventListener('mouseup', () => mouse.down = false);

// ====================== TIRO ======================
function shoot(angle) {
    const now = Date.now();
    if (now - lastShot < 160) return;
    lastShot = now;
   
    bullets.push({
        x: player.x,
        y: player.y - 8,
        vx: Math.cos(angle) * 11.5,
        vy: Math.sin(angle) * 11.5,
        life: 48,
        size: 9
    });
   
    createParticles(player.x, player.y - 12, '#aaddff', 5);
}

// ====================== PARTÍCULAS ======================
function createParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        const speed = 2 + Math.random() * 5;
        const angle = Math.random() * Math.PI * 2;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 22 + Math.random() * 20,
            color,
            size: 4 + Math.random() * 7
        });
    }
}

// ====================== INIMIGOS NORMAIS (vermelho) ======================
function spawnEnemy() {
    if (enemies.length > 9 || bossSpawned) return;
   
    const angle = Math.random() * Math.PI * 2;
    const dist = 360;
    enemies.push({
        x: player.x + Math.cos(angle) * dist,
        y: player.y + Math.sin(angle) * dist,
        size: 26,
        speed: 1.7 + Math.random() * 0.6,
        health: 3,
        color: '#c22',
        isBoss: false
    });
}

// ====================== BOSS (preto com olhos vermelhos) ======================
function spawnBoss() {
    if (bossSpawned) return;
    bossSpawned = true;
    enemies.push({
        x: W/2,
        y: 120,
        size: 68,
        speed: 1.1,
        health: 45,
        color: '#111111',   // Preto
        isBoss: true
    });
    createParticles(W/2, 120, '#ff0000', 60);
}

// ====================== LOOP ======================
const clock = { last: Date.now() };
function gameLoop() {
    if (!gameRunning) return;
    const now = Date.now();
    clock.last = now;

    // Fundo
    ctx.fillStyle = '#1a0f08';
    ctx.fillRect(0, 0, W, H);
   
    // Chão
    ctx.fillStyle = '#3a2a1f';
    for (let i = 0; i < 45; i++) {
        ctx.fillRect((i*47)%W, (i*39)%H, 26, 26);
    }

    // Movimento jogador
    let dx = 0, dy = 0;
    if (keys['w']) dy -= 1;
    if (keys['s']) dy += 1;
    if (keys['a']) dx -= 1;
    if (keys['d']) dx += 1;
    if (dx !== 0 || dy !== 0) {
        const len = Math.hypot(dx, dy);
        player.x += (dx / len) * player.speed;
        player.y += (dy / len) * player.speed;
    }
    player.x = Math.max(30, Math.min(W-30, player.x));
    player.y = Math.max(30, Math.min(H-30, player.y));

    // Tiro
    if (keys['arrowup']) shoot(-Math.PI/2);
    if (keys['arrowdown']) shoot(Math.PI/2);
    if (keys['arrowleft']) shoot(Math.PI);
    if (keys['arrowright']) shoot(0);

    if (mouse.down) {
        const dxm = mouse.x - player.x;
        const dym = mouse.y - player.y;
        const angle = Math.atan2(dym, dxm);
        shoot(angle);
    }

    // Desenhar Isaac
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.fillStyle = '#f4c8a8';
    ctx.fillRect(-14, -10, 28, 26);
    ctx.beginPath(); ctx.arc(0, -18, 14, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#4a2a1a';
    ctx.beginPath(); ctx.ellipse(0, -24, 13, 8, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(-7, -21, 6, 7); ctx.fillRect(1, -21, 6, 7);
    ctx.fillStyle = '#000';
    ctx.fillRect(-5, -19, 3, 3); ctx.fillRect(3, -19, 3, 3);
    ctx.restore();

    // Balas
    for (let i = bullets.length-1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx; b.y += b.vy; b.life--;
        const alpha = b.life / 48;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(b.x, b.y, b.size/2 + 3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#bbddff'; ctx.beginPath(); ctx.arc(b.x, b.y, b.size/2, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
        if (b.life <= 0 || b.x < -30 || b.x > W+30 || b.y < -30 || b.y > H+30) {
            bullets.splice(i, 1);
        }
    }

    // Inimigos + Boss
    for (let i = enemies.length-1; i >= 0; i--) {
        const e = enemies[i];
       
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const dist = Math.hypot(dx, dy) || 1;
       
        e.x += (dx / dist) * e.speed;
        e.y += (dy / dist) * e.speed;

        // Desenho
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.size/2, 0, Math.PI*2);
        ctx.fill();

        if (e.isBoss) {
            // Boss preto - olhos vermelhos
            ctx.fillStyle = '#fff';
            ctx.fillRect(e.x-18, e.y-14, 14, 16);
            ctx.fillRect(e.x+4, e.y-14, 14, 16);
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(e.x-13, e.y-10, 6, 8);
            ctx.fillRect(e.x+9, e.y-10, 6, 8);
        } else {
            // Inimigos normais
            ctx.fillStyle = '#fff';
            ctx.fillRect(e.x-8, e.y-6, 6, 8);
            ctx.fillRect(e.x+2, e.y-6, 6, 8);
            ctx.fillStyle = '#000';
            ctx.fillRect(e.x-6, e.y-4, 3, 4);
            ctx.fillRect(e.x+4, e.y-4, 3, 4);
        }

        // Colisão bala × inimigo
        for (let j = bullets.length-1; j >= 0; j--) {
            const b = bullets[j];
            if (Math.hypot(b.x - e.x, b.y - e.y) < e.size/2 + b.size/2) {
                e.health--;
                bullets.splice(j, 1);
                createParticles(b.x, b.y, '#ffaaaa', 12);
               
                if (e.health <= 0) {
                    createParticles(e.x, e.y, e.isBoss ? '#440000' : '#aa0000', e.isBoss ? 90 : 35);
                    enemies.splice(i, 1);
                    score += e.isBoss ? 500 : 20;
                    killCount++;
                    document.getElementById('kills').textContent = killCount;

                    // Vitória ao matar o Boss
                    if (e.isBoss) {
                        gameRunning = false;
                        document.getElementById('victoryScore').textContent = score;
                        document.getElementById('victory').style.display = 'block';
                    }
                    // Spawn do Boss aos 30 kills
                    else if (killCount >= 30 && !bossSpawned) {
                        spawnBoss();
                    }
                    break;
                }
            }
        }

        // Colisão jogador × inimigo
        if (player.invincible <= 0 && Math.hypot(player.x - e.x, player.y - e.y) < (e.isBoss ? 48 : 25)) {
            player.health -= e.isBoss ? 2 : 1;
            player.invincible = 60;
            createParticles(player.x, player.y, '#ff0000', 25);
            document.getElementById('health').textContent = player.health;
           
            if (player.health <= 0) {
                gameRunning = false;
                document.getElementById('finalScore').textContent = score;
                document.getElementById('gameOver').style.display = 'block';
            }
        }
    }

    if (player.invincible > 0) player.invincible--;

    // Spawn de inimigos
    if (!bossSpawned && Math.random() < 0.045) spawnEnemy();

    // Partículas
    for (let i = particles.length-1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * 0.97;
        p.y += p.vy * 0.97;
        p.life--;
        p.vx *= 0.96;
        p.vy *= 0.96;
       
        ctx.globalAlpha = p.life / 40;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
        if (p.life <= 0) particles.splice(i, 1);
    }
    ctx.globalAlpha = 1;

    document.getElementById('score').textContent = score;
    requestAnimationFrame(gameLoop);
}

// Iniciar
for (let i = 0; i < 4; i++) spawnEnemy();
gameLoop();

alert("The Binding of Isaac\n\nChegue a 30 kills para invocar o Boss Preto!\nDerrote ele para vencer o jogo!\n\nBoa sorte! 🔥");
</script>
</body>
</html>
