<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cuphead - CSS Art para GitHub</title>
  <style>
    body {
      height: 100vh;
      margin: 0;
      background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .scene {
      position: relative;
      width: 320px;
      height: 420px;
    }

    .cuphead {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    /* Cabeça (xícara) */
    .head {
      width: 180px;
      height: 160px;
      background: #f0e68c;        /* cor da porcelana */
      border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
      border: 8px solid #8b4513;   /* contorno marrom escuro */
      box-shadow: 
        inset 0 25px 40px rgba(0,0,0,0.15),
        0 0 0 12px #000;            /* contorno preto grosso estilo 1930 */
      position: relative;
      overflow: hidden;
    }

    /* Líquido dentro da xícara */
    .liquid {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 75px;
      background: linear-gradient(to bottom, #c41e3a, #8b0000);
      border-radius: 0 0 999px 999px;
      box-shadow: inset 0 10px 20px rgba(0,0,0,0.4);
    }

    /* Olhos */
    .eye {
      position: absolute;
      width: 48px;
      height: 60px;
      background: white;
      border-radius: 50%;
      top: 45px;
      border: 6px solid black;
      box-shadow: inset 0 8px 12px rgba(0,0,0,0.2);
    }
    .eye.left  { left: 30px; }
    .eye.right { right: 30px; }

    .pupil {
      width: 22px;
      height: 28px;
      background: #000;
      border-radius: 50%;
      position: absolute;
      top: 12px;
      left: 12px;
      box-shadow: inset -4px -4px 6px #333;
    }

    /* Nariz */
    .nose {
      width: 28px;
      height: 36px;
      background: #000;
      border-radius: 50%;
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* Sorriso malandro */
    .mouth {
      width: 80px;
      height: 40px;
      border: 6px solid black;
      border-top: none;
      border-radius: 0 0 999px 999px;
      position: absolute;
      bottom: 35px;
      left: 50%;
      transform: translateX(-50%);
      background: #000;
    }

    /* Canudo / canela */
    .straw {
      position: absolute;
      width: 24px;
      height: 110px;
      background: linear-gradient(to right, #c41e3a, #8b0000);
      top: -90px;
      left: 50%;
      transform: translateX(-50%) rotate(-12deg);
      border-radius: 12px;
      border: 6px solid #000;
      box-shadow: 4px 4px 0 #000;
      z-index: 2;
    }

    /* Luvas */
    .glove {
      width: 90px;
      height: 110px;
      background: white;
      border: 7px solid black;
      border-radius: 50% 50% 40% 40%;
      position: absolute;
      bottom: -30px;
      box-shadow: 0 8px 0 #000;
    }
    .glove.left  { left: -60px; transform: rotate(-15deg); }
    .glove.right { right: -60px; transform: rotate(15deg); }

    /* Botões da luva */
    .button {
      width: 22px;
      height: 22px;
      background: #8b4513;
      border: 4px solid black;
      border-radius: 50%;
      position: absolute;
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* Pernas / sapatos */
    .shoe {
      width: 110px;
      height: 60px;
      background: #8b4513;
      border: 8px solid black;
      border-radius: 50% 50% 30% 30%;
      position: absolute;
      bottom: -110px;
      box-shadow: 0 12px 0 #000;
    }
    .shoe.left  { left: -40px; transform: rotate(-8deg); }
    .shoe.right { right: -40px; transform: rotate(8deg); }

    h1 {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 2.2rem;
      text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
      letter-spacing: 4px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="cuphead">
      <div class="head">
        <div class="liquid"></div>
        <div class="eye left"><div class="pupil"></div></div>
        <div class="eye right"><div class="pupil"></div></div>
        <div class="nose"></div>
        <div class="mouth"></div>
      </div>
      <div class="straw"></div>

      <div class="glove left"><div class="button"></div></div>
      <div class="glove right"><div class="button"></div></div>

      <div class="shoe left"></div>
      <div class="shoe right"></div>
    </div>

    <h1>DON'T DEAL WITH THE DEVIL!</h1>
  </div>
</body>
</html>
